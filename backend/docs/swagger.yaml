      security:
      - BearerAuth: []
      summary: 创建 DNS 记录
      tags:
      - DNS
  /api/dns/records/{id}:
    delete:
      description: 删除反向区域 PTR 记录时，后端会把完整 IPv4 展示名转换为 Windows DNS 区域内相对名称后再转发给 Agent。删除正向
        A 记录时会按实际匹配关系同步删除对应 PTR 快照，不只依赖 createPtr 标记；如果数据库中没有实际匹配的 PTR 且对应反向区域不存在，不会凭
        IP 推导创建反向区域刷新任务。
      parameters:
      - description: DNS 记录标识
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
