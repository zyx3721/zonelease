          schema:
            $ref: '#/definitions/router.errorDocResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/router.errorDocResponse'
      security:
      - BearerAuth: []
      summary: 删除 DNS 记录
      tags:
      - DNS
    put:
      consumes:
      - application/json
      description: 支持修改记录值和可选 createPtr；后端会基于数据库快照校验同名同类型同值重复记录和 CNAME 值格式。A 记录带 createPtr
        标记时会同步维护关联 PTR 快照；未修改内容时也会返回当前记录。
      parameters:
      - description: DNS 记录标识
        in: path
        name: id
        required: true
        type: string
      - description: DNS 记录值
        in: body
        name: body
        required: true
