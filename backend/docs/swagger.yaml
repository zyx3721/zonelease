info:
  contact: {}
  description: ZoneLease Windows DNS / DHCP 统一管理控制台后端 API，提供认证、服务器登记、DNS/DHCP 资源管理、刷新事件和审计查询接口。
  title: ZoneLease API
  version: "1.0"
paths:
  /api/auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: 修改密码参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/router.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.errorDocResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorDocResponse'
      security:
      - BearerAuth: []
      summary: 修改当前用户密码
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/router.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.loginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.errorDocResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorDocResponse'
      summary: 登录
      tags:
      - Auth
  /api/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.statusResponse'
      security:
      - BearerAuth: []
      summary: 注销当前会话
      tags:
      - Auth
  /api/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorDocResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户
      tags:
      - Auth
  /api/auth/password-reset/captcha:
    get:
      description: 返回的 token 使用 JWT_SECRET 签名并携带过期时间，不写入 Redis。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.captchaResponse'
      summary: 获取找回密码图形验证码
      tags:
      - PasswordReset
  /api/auth/password-reset/confirm:
    post:
      consumes:
      - application/json
      description: 重置成功后会删除该用户在 sessions 表中的所有登录会话。
      parameters:
      - description: 重置参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/router.resetConfirmRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.errorDocResponse'
      summary: 确认找回密码并重置密码
      tags:
      - PasswordReset
  /api/auth/password-reset/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: 发送参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/router.resetSendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/router.sendResetResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.errorDocResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/router.errorDocResponse'
      summary: 发送找回密码验证码
      tags:
      - PasswordReset
  /api/auth/password-reset/verify:
    post:
      consumes:
      - application/json
      description: 校验顺序为图形验证码、账号可找回状态和找回密码媒介可用性；用户不存在、禁用、非本地账号或未配置邮箱时返回 password_reset_unavailable，未启用找回密码邮件媒介时返回
        no_password_reset_channel。
      parameters:
      - description: 校验参数
        in: body
        name: body
        required: true
