        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/router.errorDocResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/router.errorDocResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/router.errorDocResponse'
